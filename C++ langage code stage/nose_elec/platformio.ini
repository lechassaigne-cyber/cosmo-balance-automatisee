[env:seeed_wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino

monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BME680 Library
    sensirion/Sensirion I2C SGP40
    sensirion/Sensirion I2C SGP41
    https://github.com/Seeed-Studio/Seeed_Arduino_MultiGas.git
    https://github.com/Seeed-Studio/Seeed_Arduino_rpcBLE.git
    https://github.com/Seeed-Studio/Seeed_Arduino_rpcUnified.git